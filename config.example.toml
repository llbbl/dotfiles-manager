# dotfiles-manager — example config
#
# Real config lives at ~/.config/dotfiles/config.toml (or the path passed
# via --config). Run `dfm config show` to see the effective config
# after defaults + env overrides are applied.

[repo]
# Private GitHub repo that stores tracked file copies and audit logs.
remote = "git@github.com:llbbl/dotfiles-private.git"
# Local clone of the private backup repo.
local  = "~/.local/share/dotfiles/repo"

[ai]
# Provider used for `dfm ask` and `dfm suggest`. Currently only
# "claude-code" is implemented; the interface is pluggable.
provider = "claude-code"

[ai.claude-code]
# Path to the Claude Code CLI binary on $PATH.
bin        = "claude"
# Optional model override; empty string = CC default.
model      = ""
# Extra args appended to every `claude -p ...` invocation.
extra_args = []

[log]
# JSONL action log written by `dfm sync` and other writes.
path = "~/.local/share/dotfiles/logs/actions.jsonl"

# Where audit events are stored. One of:
#   both  — JSONL file + libSQL actions table (default)
#   jsonl — JSONL file only
#   db    — libSQL actions table only
#   none  — disabled
# Override at runtime via DFM_LOG_BACKEND.
backend = "both"

[backup]
# Pre-modification snapshot store. Blobs are content-addressed (sha256)
# and deduplicated. See `dfm backups`, `dfm restore`, and
# `dfm prune`.
dir            = "~/.local/share/dotfiles/backups"
# Soft cap on total blob bytes; 0 = unlimited.
max_total_mb   = 500
# Retention window; older snapshots are evicted by `prune`. 0 = forever.
# The most recent snapshot per file is always preserved regardless.
retention_days = 90

# State (libSQL/Turso) is configured exclusively via environment variables:
#   TURSO_DATABASE_URL   libsql://<db>-<org>.turso.io   (or unset for embedded file)
#   TURSO_AUTH_TOKEN     long-lived token from `turso db tokens create <db>`
# See .env.example.

[runtime]
# Optional .env file loaded at startup, BEFORE any other config reads.
# KEY=VALUE pairs are applied via os.Setenv only when the key is not
# already set in the shell environment — your shell always wins.
#
# Values:
#   ""        — disabled (default)
#   "off"     — disabled (explicit)
#   "auto"    — load $XDG_CONFIG_HOME/dotfiles/.env or ./.env if either
#               exists; silently skip if neither does.
#   "<path>"  — explicit path; missing file is an error (exit 2).
#
# CLI overrides (in precedence order, highest first):
#   --no-dotenv         skip entirely
#   --dotenv <path>     explicit path
#   DFM_ENV_FILE        explicit path (env var)
#
# Run `dfm config show` to see which source (if any) was loaded.
dotenv = ""
