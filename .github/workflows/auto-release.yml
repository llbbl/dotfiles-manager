name: Auto Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  version:
    name: Determine Version and Tag
    runs-on: ubuntu-latest
    if: "!startsWith(github.event.head_commit.message, 'chore(release):')"
    outputs:
      tag: ${{ steps.version.outputs.next }}
      skip: ${{ steps.version.outputs.skip }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.7"
          cache: true

      - name: Sanity check
        run: |
          go vet ./...
          go test -count=1 ./...

      - name: Determine next version
        id: version
        run: |
          latest_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "latest=$latest_tag"

          version="${latest_tag#v}"
          IFS='.' read -r major minor patch <<< "$version"

          commits=$(git log "$latest_tag"..HEAD --pretty=format:"%s" 2>/dev/null || git log --pretty=format:"%s")

          if [ -z "$commits" ]; then
            echo "No new commits since $latest_tag; skipping release."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Major bumps are MANUAL — see docs/development.md "Releases" section.
          # `feat!:` / `BREAKING CHANGE:` footers fall through to the feat branch
          # below (minor bump), not a major bump. This guards against accidental
          # 2.0 releases while the project is still in rapid-iteration mode.
          if echo "$commits" | grep -qE "^feat(\(.+\))?!?:"; then
            minor=$((minor + 1))
            patch=0
          elif echo "$commits" | grep -qE "^(fix|perf)(\(.+\))?!?:"; then
            patch=$((patch + 1))
          else
            echo "No release-worthy commits since $latest_tag; skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          next="v${major}.${minor}.${patch}"
          echo "next=$next" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "Next version: $next (from $latest_tag)"

      - name: Tag and push
        if: steps.version.outputs.skip != 'true'
        env:
          TAG: ${{ steps.version.outputs.next }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

  release:
    name: Build and Publish Release
    needs: version
    if: needs.version.outputs.skip != 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.version.outputs.tag }}
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.7"
          cache: true

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: RELEASE_NOTES.md

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean --release-notes=RELEASE_NOTES.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
